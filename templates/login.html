<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Student Support Portal - Login</title>
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card glass-panel">
            <div class="brand-header">
                <div class="brand-logo"><i class="fa-solid fa-graduation-cap"></i> Prince AI Chatbot</div>
                <div class="brand-desc">AI-Powered Student Support Services</div>
            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-msg {{ category }}">
                            {% if category == 'success' %}
                                <i class="fa-solid fa-circle-check"></i>
                            {% else %}
                                <i class="fa-solid fa-circle-exclamation"></i>
                            {% endif %}
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="auth-tabs">
                <button type="button" class="auth-tab-btn active" id="login-tab">Sign In</button>
                <button type="button" class="auth-tab-btn" id="register-tab">Register</button>
            </div>

            <!-- Login Form -->
            <form action="{{ url_for('login') }}" method="POST" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="login-username">Username</label>
                    <div class="input-container">
                        <input type="text" id="login-username" name="username" class="form-input" placeholder="e.g., student, admin, alice" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <div class="input-container">
                        <input type="password" id="login-password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="login-btn">
                    <span>Access Account</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <!-- Registration Form -->
            <form action="{{ url_for('register') }}" method="POST" id="register-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label" for="reg-fullname">Full Name</label>
                    <input type="text" id="reg-fullname" name="full_name" class="form-input" placeholder="e.g., Rohan Sharma" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" class="form-input" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="password" class="form-input" placeholder="Create password" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="reg-roll">Roll Number</label>
                        <input type="text" id="reg-roll" name="roll_number" class="form-input" placeholder="CS2023001" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-semester">Semester</label>
                        <select id="reg-semester" name="semester" class="form-input" required>
                            <option value="Semester 1">Semester 1</option>
                            <option value="Semester 2">Semester 2</option>
                            <option value="Semester 3">Semester 3</option>
                            <option value="Semester 4">Semester 4</option>
                            <option value="Semester 5" selected>Semester 5</option>
                            <option value="Semester 6">Semester 6</option>
                            <option value="Semester 7">Semester 7</option>
                            <option value="Semester 8">Semester 8</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-course">Course / Department</label>
                    <select id="reg-course" name="course" class="form-input" required>
                        <option value="Computer Science" selected>Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics Engineering">Electronics Engineering</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">
                    <span>Create Account</span>
                    <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Inline tabs management for login / register forms toggle
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.style.display = 'block';
            loginForm.style.display = 'none';
        });
    </script>
</body>
</html>
